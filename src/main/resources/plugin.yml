#file: noinspection SpellCheckingInspection
name: 'GearAscendance'
description: 'Adds a new extension beyond enchantment and netherite smithing.'
version: '1.0.0'
main: 'io.github.rainvaporeon.gearascendance.EntryPoint'
api-version: '26.1'
author: 'RainVaporeon'

commands:
  ascendance:
    description: 'Main command'
    permission: 'ascendance.give.template'
    usage: "/ascendance give template [amount] [tier] [blessed] [bias]"
  ascendance_updateitem:
    description: 'Updates GearAscendance Hand Item Text'
    permission: 'ascendance.updateitem'
    usage: '/ascendance_updateitem'

permissions:
  ascendance.updateitem:
    description: 'Provides capability to update held hand item'
    default: true
  ascendance.*:
    description: 'Provides all capabilities to /ascendance'
    default: op
    children:
      ascendance.give.*: true
      ascendance.updateitem: true
  ascendance.give.*:
    description: 'Provides all give capabilities to /ascendance'
    children:
      ascendance.give.template: true